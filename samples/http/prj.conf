# =============================================================================
# Conexio Console — HTTPS telemetry sample for nRF91xx
# nRF Connect SDK v3.2.1
# =============================================================================

# ── Device identity and API credentials (EDIT THESE) ─────────────────────────
CONFIG_CONEXIO_DEVICE_ID="my-nrf-device"
CONFIG_CONEXIO_API_KEY="REPLACE_WITH_YOUR_API_KEY"
# Get key: aws secretsmanager get-secret-value \
#   --secret-id iot-dashboard/device-ingest-api-key --query SecretString --output text

CONFIG_CONEXIO_API_HOST="REPLACE_WITH_API_GATEWAY_HOST"
# e.g. abc123.execute-api.us-east-1.amazonaws.com
# (without https:// prefix)

# ── Telemetry interval ────────────────────────────────────────────────────────
CONFIG_CONEXIO_TELEMETRY_INTERVAL_SEC=60

# ── LTE / modem ───────────────────────────────────────────────────────────────
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y

# ── Networking ────────────────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_NET_SOCKETS_OFFLOAD=y

# ── TLS (modem-offloaded) ─────────────────────────────────────────────────────
CONFIG_NET_SECURITY=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MODEM_KEY_MGMT=y

# The AWS Root CA is provisioned at first boot using modem_key_mgmt.
# It uses TLS security tag 1 automatically.

# ── HTTP client ───────────────────────────────────────────────────────────────
CONFIG_HTTP_CLIENT=y
CONFIG_NET_HTTP_LOG_LEVEL_DBG=n

# ── JSON ──────────────────────────────────────────────────────────────────────
CONFIG_CJSON_LIB=y

# ── Date/time ─────────────────────────────────────────────────────────────────
CONFIG_DATE_TIME=y
CONFIG_DATE_TIME_NTP=y

# ── Stack sizes ───────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_UART_CONSOLE=y

# ── Modem info (RSSI) ─────────────────────────────────────────────────────────
CONFIG_MODEM_INFO=y
CONFIG_MODEM_INFO_ADD_NETWORK=y

# ── NVS flash (for persistent reboot counter) ─────────────────────────────────
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# ── Reset on fatal errors ─────────────────────────────────────────────────────
CONFIG_RESET_ON_FATAL_ERROR=y
