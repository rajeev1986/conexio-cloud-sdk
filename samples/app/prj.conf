# =============================================================================
# Conexio Advanced Sample App — prj.conf
#
# All production-grade features are now part of conexio-cloud-sdk-v2.
# Enable them here with CONFIG_CONEXIO_CLOUD_* options.
# The SDK handles all module initialisation internally.
#
# nRF Connect SDK v3.2.1 / nRF91xx
# =============================================================================

# ── Conexio Cloud SDK (Phase 2 — zero-config) ─────────────────────────────────
# No endpoint needed — fetched at runtime from config.conexio.io
CONFIG_CONEXIO_CLOUD=y
CONFIG_CONEXIO_CLOUD_MQTT=y
CONFIG_CONEXIO_CLOUD_INTERVAL_SEC=60

# ── Power Saving Mode (PSM) ───────────────────────────────────────────────────
# Modem sleeps between publishes (~2-3 µA vs ~6 mA idle connected).
# Typical battery improvement: 5-20x.
CONFIG_CONEXIO_CLOUD_PSM=y
CONFIG_CONEXIO_CLOUD_PSM_TAU_SEC=3600
CONFIG_CONEXIO_CLOUD_PSM_ACTIVE_TIME_SEC=10

# ── Offline telemetry buffer ───────────────────────────────────────────────────
# Buffers payloads in NVS flash when offline. Replays on reconnect.
CONFIG_CONEXIO_CLOUD_OFFLINE_BUFFER=y
CONFIG_CONEXIO_CLOUD_OFFLINE_BUFFER_SIZE=100
CONFIG_CONEXIO_CLOUD_OFFLINE_REPLAY_BATCH=10

# ── FOTA — Firmware Over-the-Air updates ──────────────────────────────────────
# Triggered by a FIRMWARE_UPDATE command from the Conexio Console Firmware page.
CONFIG_CONEXIO_CLOUD_FOTA=y
CONFIG_CONEXIO_CLOUD_FOTA_DOWNLOAD_TIMEOUT_SEC=300
# FOTA dependencies — explicit in NCS v3.2.1
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_DFU_TARGET=y
CONFIG_DFU_TARGET_MCUBOOT=y
CONFIG_STREAM_FLASH=y
CONFIG_DOWNLOAD_CLIENT=y
CONFIG_FOTA_DOWNLOAD=y
CONFIG_FOTA_DOWNLOAD_PROGRESS_EVT=y

# ── Retry / watchdog ──────────────────────────────────────────────────────────
# Exponential backoff reconnect + hardware watchdog reboot on stall.
CONFIG_CONEXIO_CLOUD_RETRY=y
CONFIG_CONEXIO_CLOUD_RETRY_BASE_SEC=5
CONFIG_CONEXIO_CLOUD_RETRY_MAX_SEC=300
CONFIG_CONEXIO_CLOUD_RETRY_MAX_ATTEMPTS=10
CONFIG_CONEXIO_CLOUD_WATCHDOG_TIMEOUT_SEC=600

# ── LTE / Modem ───────────────────────────────────────────────────────────────
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_MODEM_INFO=y
CONFIG_MODEM_INFO_ADD_NETWORK=y

# ── Networking ────────────────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MODEM_KEY_MGMT=y
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_KEEPALIVE=120
CONFIG_HTTP_CLIENT=y

# ── JSON ──────────────────────────────────────────────────────────────────────
CONFIG_CJSON_LIB=y

# ── Date/time ─────────────────────────────────────────────────────────────────
CONFIG_DATE_TIME=y
CONFIG_DATE_TIME_NTP=y

# ── Stack / heap ──────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_UART_CONSOLE=y

# ── Reset on fatal ────────────────────────────────────────────────────────────
CONFIG_RESET_ON_FATAL_ERROR=y
