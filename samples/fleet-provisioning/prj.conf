# =============================================================================
# Conexio Console — Fleet Provisioning sample for nRF91xx
# nRF Connect SDK v3.2.1
#
# ONE binary for the entire fleet. No per-device configuration needed.
# The device derives its unique ID from the modem's IMEI at runtime.
# =============================================================================

# ── AWS endpoint (shared by all devices) ──────────────────────────────────────
CONFIG_CONEXIO_AWS_BROKER_HOSTNAME="REPLACE_WITH_YOUR_AWS_IOT_ENDPOINT"
# Get endpoint: aws iot describe-endpoint --endpoint-type iot:Data-ATS

# ── Fleet Provisioning template name (must match CDK/deploy.sh) ───────────────
CONFIG_CONEXIO_FLEET_TEMPLATE_NAME="ConexioFleetTemplate"

# ── Telemetry interval after provisioning ─────────────────────────────────────
CONFIG_CONEXIO_TELEMETRY_INTERVAL_SEC=60

# ── LTE / modem ───────────────────────────────────────────────────────────────
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y

# ── Networking ────────────────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_NET_SOCKETS_OFFLOAD=y

# ── TLS ───────────────────────────────────────────────────────────────────────
CONFIG_NET_SECURITY=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MODEM_KEY_MGMT=y

# ── MQTT ──────────────────────────────────────────────────────────────────────
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_KEEPALIVE=120

# ── JSON (cJSON) ──────────────────────────────────────────────────────────────
CONFIG_CJSON_LIB=y

# ── Date/time ─────────────────────────────────────────────────────────────────
CONFIG_DATE_TIME=y
CONFIG_DATE_TIME_NTP=y

# ── Modem info (IMEI for device ID, RSSI for signal quality) ──────────────────
CONFIG_MODEM_INFO=y
CONFIG_MODEM_INFO_ADD_NETWORK=y

# ── Settings subsystem (persists provisioning state across reboots) ───────────
# Uses internal flash to store a single flag: "provisioned = true"
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FCB=y
CONFIG_FCB=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# ── NVS flash (for persistent reboot counter) ─────────────────────────────────
# NVS and Settings/FCB share the same flash partition safely.
CONFIG_NVS=y

# ── Stack sizes ───────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=y

# ── Reset on fatal errors ─────────────────────────────────────────────────────
CONFIG_RESET_ON_FATAL_ERROR=y
